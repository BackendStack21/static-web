<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --red:     #f85149;
      --cyan:    #79c0ff;
      --mono:    "JetBrains Mono", "Fira Code", "Cascadia Code", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      max-width: 720px;
      margin: 0 auto;
    }

    .line {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-height: 1.6em;
    }

    .line + .line { margin-top: 2px; }
    .spacer       { margin-top: 20px; }

    .prompt { color: var(--muted); user-select: none; }
    .err    { color: var(--red);   }
    .dim    { color: var(--muted); }

    .block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red);
      border-radius: 6px;
      padding: 16px 20px;
      margin-top: 24px;
      width: 100%;
    }

    .block-title {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .kv {
      display: flex;
      gap: 12px;
      line-height: 1.9;
    }

    .key {
      color: var(--muted);
      flex-shrink: 0;
      min-width: 80px;
    }

    .val { color: var(--text); }

    .path-val {
      color: var(--red);
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }

    .btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
      width: 100%;
    }

    .footer-line {
      color: var(--muted);
      font-size: 12px;
    }

    a.plain {
      color: var(--cyan);
      text-decoration: none;
    }

    a.plain:hover { text-decoration: underline; }

    @media (max-width: 540px) {
      body { font-size: 13px; padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <div class="line">
    <span class="prompt">$</span>
    <span>GET <span class="path-val">…</span></span>
  </div>

  <div class="line spacer">
    <span class="err">✗</span>
    <span><strong>404</strong> — resource not found</span>
  </div>

  <div class="block">
    <div class="block-title">// error details</div>
    <div class="kv">
      <span class="key">status</span>
      <span class="val err">404 Not Found</span>
    </div>
    <div class="kv">
      <span class="key">hint</span>
      <span class="val dim">the file does not exist or was moved</span>
    </div>
    <div class="kv">
      <span class="key">tip</span>
      <span class="val dim">double-check the URL for typos</span>
    </div>
  </div>

  <div class="actions">
    <a href="/" class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ~/
    </a>
  </div>

  <hr class="section-divider" />

  <div class="footer-line">
    Powered by <a class="plain" href="https://github.com/BackendStack21/static-web">static-web</a>
    &mdash; <a class="plain" href="https://21no.de">BackendStack21</a>
  </div>


</body>
</html>
